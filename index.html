<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>持仓成本计算器 · 自动保存版</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f2f5f9;
            margin: 0;
            padding: 16px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1f2f3e;
        }

        .app-container {
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f8;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0;
            color: #1e2f3f;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-sm {
            background: #eef2ff;
            color: #2c6e9e;
            font-size: 0.7rem;
            border-radius: 60px;
            padding: 4px 12px;
            font-weight: 500;
        }

        .trade-list {
            overflow-x: auto;
            margin: 0 -6px;
            padding: 0 6px;
        }

        .trade-table {
            width: 100%;
            min-width: 550px;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .trade-table th {
            text-align: left;
            padding: 12px 6px 10px 0;
            color: #5f7d9c;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .trade-table td {
            padding: 12px 6px 12px 0;
            border-bottom: 1px solid #ecf3fa;
            vertical-align: middle;
        }

        .type-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            min-width: 68px;
            text-align: center;
        }

        .type-buy { background: #e0f7ea; color: #0b6e41; }
        .type-sell { background: #ffe6e3; color: #bc1c2e; }

        .input-micro {
            width: 88px;
            padding: 8px 8px;
            border-radius: 20px;
            border: 1px solid #cfdfed;
            background: white;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            transition: 0.15s;
        }

        .input-micro:focus {
            outline: none;
            border-color: #2d7fb9;
            box-shadow: 0 0 0 2px rgba(45, 127, 185, 0.1);
        }

        .fee-detail-text {
            background: #f4f8fe;
            padding: 5px 8px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
            color: #2a5f8a;
        }

        .cash-number {
            font-family: monospace;
            font-weight: 600;
            background: #f8fafc;
            padding: 4px 8px;
            border-radius: 24px;
            display: inline-block;
            font-size: 0.8rem;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #9bb4cc;
            padding: 6px 6px;
            border-radius: 30px;
            transition: 0.1s;
        }

        .delete-btn:active {
            background: #f0eef2;
            color: #d14545;
        }

        .fee-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
            margin-top: 6px;
        }

        .fee-item {
            flex: 1;
            min-width: 110px;
        }

        .fee-item label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #5a6f8c;
            display: block;
            margin-bottom: 8px;
        }

        .fee-item input {
            width: 100%;
            padding: 12px 10px;
            border-radius: 24px;
            border: 1px solid #dae6f0;
            background: white;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }

        .result-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-block {
            flex: 1;
            background: #f8fbfe;
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            min-width: 110px;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6c8db0;
            margin-bottom: 6px;
        }

        .result-number {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: monospace;
            color: #1e2f3f;
            word-break: break-word;
        }

        .highlight-number {
            color: #da7b2c;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            justify-content: center;
        }

        .btn {
            border: none;
            background: #eff3f9;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
            color: #2a5f8a;
            flex: 1 0 auto;
            text-align: center;
        }

        .btn-primary {
            background: #1f6f9e;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-primary:active {
            background: #0e5a82;
            transform: scale(0.97);
        }

        .btn-outline:active {
            background: #e2eaf3;
            transform: scale(0.97);
        }

        .footnote {
            font-size: 0.65rem;
            text-align: center;
            color: #8aa3c0;
            padding: 12px 8px 4px;
            border-top: 1px solid #eff3f8;
            margin-top: 10px;
        }

        .empty-rows {
            text-align: center;
            color: #8da0b5;
            padding: 30px 10px;
            font-size: 0.85rem;
        }

        @media (min-width: 760px) {
            body { padding: 28px; }
            .app-container { max-width: 1100px; }
            .trade-table { min-width: auto; }
            .input-micro { width: 100px; padding: 10px; }
            .result-number { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 交易流水卡片 -->
    <div class="card">
        <div class="card-header">
            <h2>📋 交易流水 <span class="badge-sm">自动保存到本地</span></h2>
            <div class="button-group" style="margin-top:0;">
                <button class="btn btn-outline" id="addBuyBtn">➕ 买入</button>
                <button class="btn btn-outline" id="addSellBtn">📤 卖出</button>
                <button class="btn btn-outline" id="resetBtn">🗑️ 清空全部</button>
            </div>
        </div>
        <div class="trade-list">
            <table class="trade-table" id="tradeTable">
                <thead>
                <tr><th>类型</th><th>价格(元)</th><th>股数</th><th>本次净现金流</th><th>费用明细</th><th>持仓成本</th><th></th></tr>
                </thead>
                <tbody id="tradeTbody">
                <tr><td colspan="7" class="empty-rows">✨ 暂无交易，点击「买入」或「卖出」添加</td></tr>
                </tbody>
            </table>
        </div>
        <div class="footnote" style="border-top:none; text-align:left;">
            💡 添加交易后价格/股数留空，请手动填写真实数据。所有记录会自动保存在浏览器中。
        </div>
    </div>

    <!-- 费率卡片 -->
    <div class="card">
        <div class="card-header"><h2>⚙️ 费率设置</h2></div>
        <div class="fee-grid">
            <div class="fee-item"><label>📌 单笔佣金 (元/笔)</label><input type="number" id="commissionFee" step="1" value="5"></div>
            <div class="fee-item"><label>🧾 印花税率 (%)</label><input type="number" id="stampTax" step="0.01" value="0.05"><div style="font-size:10px;">ETF为0%</div></div>
            <div class="fee-item"><label>📄 过户费 (元/万股)</label><input type="number" id="transferFee" step="0.1" value="0"></div>
        </div>
    </div>

    <!-- 持仓概览卡片 -->
    <div class="card">
        <div class="card-header"><h2>📈 持仓概览</h2></div>
        <div class="result-grid">
            <div class="result-block"><div class="result-label">📦 持股数量</div><div class="result-number" id="sharesCount">0</div></div>
            <div class="result-block"><div class="result-label">✨ 每股成本</div><div class="result-number highlight-number" id="avgCostVal">0.0000 元</div></div>
            <div class="result-block"><div class="result-label">💰 净投入资金</div><div class="result-number" id="netInvestVal">0.00 元</div></div>
        </div>
        <div class="result-grid">
            <div class="result-block"><div class="result-label">🏦 持仓市值</div><div class="result-number" id="marketValue">0.00 元</div></div>
            <div class="result-block"><div class="result-label">📊 浮动盈亏</div><div class="result-number" id="floatProfit">0.00 元</div></div>
            <div class="result-block"><div class="result-label">💰 总支出(含费)</div><div class="result-number" id="totalExp">0.00 元</div></div>
        </div>
        <button class="btn btn-primary" id="refreshCalcBtn" style="margin-top:8px;">⟳ 刷新计算</button>
    </div>
    <div class="footnote">* 所有交易记录自动保存至你的设备，关闭页面或换设备打开同一链接依然存在（本地存储）。</div>
</div>

<script>
    // ---------- 存储KEY ----------
    const STORAGE_KEY = 'trade_calculator_data';
    const FEE_KEY = 'trade_calculator_fees';

    // ---------- 全局交易数据 ----------
    let transactions = [];   // 每个元素 { id, type, price, shares }

    // ---------- 辅助函数：保存到 localStorage ----------
    function saveTransactions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
    }

    function loadTransactions() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                transactions = JSON.parse(raw);
                // 保证每条记录都有id (旧数据兼容)
                if (!transactions.some(t => t.id === undefined)) {
                    transactions = transactions.map(t => ({ ...t, id: t.id || Date.now() + Math.random() }));
                }
            } catch(e) { transactions = []; }
        } else {
            transactions = [];
        }
    }

    function saveFees() {
        const fees = {
            commission: document.getElementById('commissionFee').value,
            stamp: document.getElementById('stampTax').value,
            transfer: document.getElementById('transferFee').value
        };
        localStorage.setItem(FEE_KEY, JSON.stringify(fees));
    }

    function loadFees() {
        const raw = localStorage.getItem(FEE_KEY);
        if (raw) {
            try {
                const fees = JSON.parse(raw);
                if (fees.commission !== undefined) document.getElementById('commissionFee').value = fees.commission;
                if (fees.stamp !== undefined) document.getElementById('stampTax').value = fees.stamp;
                if (fees.transfer !== undefined) document.getElementById('transferFee').value = fees.transfer;
            } catch(e) {}
        }
    }

    // ---------- 费用计算逻辑 ----------
    function calcBuyFlow(price, shares, comm, transPer10k) {
        const amount = price * shares;
        let transfer = transPer10k > 0 ? (amount / 10000) * transPer10k : 0;
        const totalOut = amount + comm + transfer;
        return { amount, commission: comm, transfer, totalOut };
    }

    function calcSellFlow(price, shares, comm, stampRate, transPer10k) {
        const amount = price * shares;
        let stamp = stampRate > 0 ? amount * (stampRate / 100) : 0;
        let transfer = transPer10k > 0 ? (amount / 10000) * transPer10k : 0;
        const totalIn = amount - comm - stamp - transfer;
        return { amount, commission: comm, stamp, transfer, totalIn };
    }

    // 综合统计
    function computeStats() {
        let comm = parseFloat(document.getElementById('commissionFee').value) || 0;
        let stampRate = parseFloat(document.getElementById('stampTax').value) || 0;
        let transPer10k = parseFloat(document.getElementById('transferFee').value) || 0;

        let totalExp = 0, totalIncome = 0, netShares = 0;
        for (let tx of transactions) {
            let price = parseFloat(tx.price);
            let shares = parseInt(tx.shares);
            if (isNaN(price) || isNaN(shares) || shares <= 0 || price <= 0) continue;
            if (tx.type === 'buy') {
                let buy = calcBuyFlow(price, shares, comm, transPer10k);
                totalExp += buy.totalOut;
                netShares += shares;
            } else {
                let sell = calcSellFlow(price, shares, comm, stampRate, transPer10k);
                totalIncome += sell.totalIn;
                netShares -= shares;
            }
        }
        const netInvest = totalExp - totalIncome;
        let avgCost = 0;
        if (netShares > 0) avgCost = netInvest / netShares;
        else if (netShares === 0) avgCost = 0;
        else avgCost = -1;

        let lastPrice = 1.0;
        if (transactions.length > 0) {
            for (let i = transactions.length-1; i >= 0; i--) {
                let p = parseFloat(transactions[i].price);
                if (!isNaN(p) && p > 0) { lastPrice = p; break; }
            }
        } else {
            lastPrice = 1.0;
        }
        const currentMktValue = netShares > 0 ? netShares * lastPrice : 0;
        const floatProfit = netShares > 0 && avgCost > 0 ? (lastPrice - avgCost) * netShares : 0;
        return { netShares, totalExp, totalIncome, netInvest, avgCost, currentMktValue, floatProfit, lastPrice };
    }

    // 渲染表格 + 刷新统计（同时保存交易数据）
    function renderAndSave() {
        // 保存当前交易数据
        saveTransactions();

        const tbody = document.getElementById('tradeTbody');
        if (transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-rows">✨ 暂无交易，点击「买入」或「卖出」添加记录</td></tr>';
        } else {
            let html = '';
            for (let i = 0; i < transactions.length; i++) {
                const tx = transactions[i];
                const priceVal = tx.price !== undefined && !isNaN(parseFloat(tx.price)) ? parseFloat(tx.price) : '';
                const sharesVal = tx.shares !== undefined && !isNaN(parseInt(tx.shares)) ? parseInt(tx.shares) : '';

                // 展示本次现金流和费用明细（基于当前费率）
                const commNow = parseFloat(document.getElementById('commissionFee').value) || 0;
                const stampNow = parseFloat(document.getElementById('stampTax').value) || 0;
                const transNow = parseFloat(document.getElementById('transferFee').value) || 0;
                let cashFlow = 0, feeDesc = '';
                let validForPreview = (typeof priceVal === 'number' && !isNaN(priceVal) && priceVal > 0 && typeof sharesVal === 'number' && !isNaN(sharesVal) && sharesVal > 0);
                if (validForPreview) {
                    if (tx.type === 'buy') {
                        const buyRes = calcBuyFlow(priceVal, sharesVal, commNow, transNow);
                        cashFlow = -buyRes.totalOut;
                        feeDesc = `佣 ${buyRes.commission.toFixed(2)} | 过 ${buyRes.transfer.toFixed(2)}`;
                    } else {
                        const sellRes = calcSellFlow(priceVal, sharesVal, commNow, stampNow, transNow);
                        cashFlow = sellRes.totalIn;
                        feeDesc = `佣 ${sellRes.commission.toFixed(2)} | 印 ${sellRes.stamp.toFixed(2)} | 过 ${sellRes.transfer.toFixed(2)}`;
                    }
                } else {
                    cashFlow = 0;
                    feeDesc = '待填数据';
                }

                // 计算截止到这一笔的累计持仓成本金额
                let simExp = 0, simInc = 0, simShares = 0;
                for (let j = 0; j <= i; j++) {
                    const t = transactions[j];
                    const p = parseFloat(t.price);
                    const s = parseInt(t.shares);
                    if (isNaN(p) || isNaN(s) || s <= 0 || p <= 0) continue;
                    const commT = parseFloat(document.getElementById('commissionFee').value) || 0;
                    const stampT = parseFloat(document.getElementById('stampTax').value) || 0;
                    const transT = parseFloat(document.getElementById('transferFee').value) || 0;
                    if (t.type === 'buy') {
                        const b = calcBuyFlow(p, s, commT, transT);
                        simExp += b.totalOut;
                        simShares += s;
                    } else {
                        const sel = calcSellFlow(p, s, commT, stampT, transT);
                        simInc += sel.totalIn;
                        simShares -= s;
                    }
                }
                const netInvestNow = simExp - simInc;
                const holdingAmount = (simShares > 0) ? netInvestNow : 0;
                const displayHolding = (simShares > 0 && holdingAmount > 0) ? holdingAmount.toFixed(2) : '0.00';

                const typeLabel = tx.type === 'buy' ? '买入' : '卖出';
                const typeClass = tx.type === 'buy' ? 'type-buy' : 'type-sell';
                const priceDisplay = (typeof priceVal === 'number' && !isNaN(priceVal)) ? priceVal : '';
                const sharesDisplay = (typeof sharesVal === 'number' && !isNaN(sharesVal)) ? sharesVal : '';
                html += `<tr>
                    <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
                    <td><input type="number" step="0.001" class="input-micro edit-price" value="${priceDisplay}" data-idx="${i}" placeholder="价格" style="width:85px;"></td>
                    <td><input type="number" step="1" class="input-micro edit-shares" value="${sharesDisplay}" data-idx="${i}" placeholder="股数" style="width:80px;"></td>
                    <td><span class="cash-number">${validForPreview ? cashFlow.toFixed(2) : '—'}</span></td>
                    <td><span class="fee-detail-text">${feeDesc}</span></td>
                    <td><span class="cash-number">${displayHolding} 元</span></td>
                    <td><button class="delete-btn" data-remove="${i}">✕</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;

            // 绑定编辑事件
            document.querySelectorAll('.edit-price').forEach(inp => {
                inp.removeEventListener('change', handlePriceChange);
                inp.addEventListener('change', handlePriceChange);
            });
            document.querySelectorAll('.edit-shares').forEach(inp => {
                inp.removeEventListener('change', handleSharesChange);
                inp.addEventListener('change', handleSharesChange);
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.removeEventListener('click', handleDelete);
                btn.addEventListener('click', handleDelete);
            });
        }

        // 更新底部统计
        const stats = computeStats();
        document.getElementById('sharesCount').innerText = stats.netShares >= 0 ? `${stats.netShares} 股` : (stats.netShares<0 ? '空仓' : '0');
        document.getElementById('avgCostVal').innerText = (stats.avgCost > 0 ? stats.avgCost.toFixed(4) : (stats.netShares===0 ? '0.0000' : '----')) + ' 元';
        document.getElementById('netInvestVal').innerText = stats.netInvest.toFixed(2) + ' 元';
        document.getElementById('marketValue').innerText = stats.currentMktValue.toFixed(2) + ' 元';
        document.getElementById('floatProfit').innerText = (stats.floatProfit >= 0 ? `+${stats.floatProfit.toFixed(2)}` : `${stats.floatProfit.toFixed(2)}`) + ' 元';
        document.getElementById('totalExp').innerText = stats.totalExp.toFixed(2) + ' 元';
    }

    function handlePriceChange(e) {
        let idx = parseInt(e.target.dataset.idx);
        let newPrice = parseFloat(e.target.value);
        if (!isNaN(newPrice) && transactions[idx]) {
            transactions[idx].price = newPrice;
        } else if (transactions[idx]) {
            transactions[idx].price = undefined;
        }
        renderAndSave();
    }

    function handleSharesChange(e) {
        let idx = parseInt(e.target.dataset.idx);
        let newShares = parseInt(e.target.value);
        if (!isNaN(newShares) && newShares > 0 && transactions[idx]) {
            transactions[idx].shares = newShares;
        } else if (transactions[idx]) {
            transactions[idx].shares = undefined;
        }
        renderAndSave();
    }

    function handleDelete(e) {
        let idx = parseInt(e.target.dataset.remove);
        if (!isNaN(idx) && transactions[idx]) {
            transactions.splice(idx, 1);
            renderAndSave();
        }
    }

    // 添加交易记录（价格/股数均为空）
    function addTransaction(type) {
        transactions.push({
            id: Date.now() + Math.random(),
            type: type,
            price: undefined,
            shares: undefined
        });
        renderAndSave();
    }

    // 重置所有记录
    function resetAll() {
        if (confirm('⚠️ 清空所有交易记录，无法恢复。确定吗？')) {
            transactions = [];
            renderAndSave();
        }
    }

    // 费率变动保存并刷新
    function bindFeeAutoSave() {
        const feeInputs = ['commissionFee', 'stampTax', 'transferFee'];
        feeInputs.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', () => {
                saveFees();
                renderAndSave();
            });
        });
    }

    // 手动刷新
    document.getElementById('refreshCalcBtn').addEventListener('click', () => renderAndSave());
    document.getElementById('addBuyBtn').addEventListener('click', () => addTransaction('buy'));
    document.getElementById('addSellBtn').addEventListener('click', () => addTransaction('sell'));
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    // 加载历史数据
    loadTransactions();
    loadFees();
    bindFeeAutoSave();
    renderAndSave();
</script>
</body>
</html>
