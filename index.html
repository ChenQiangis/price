<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>投资成本计算器 · 手机/电脑通用版</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f2f5f9;
            margin: 0;
            padding: 16px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1f2f3e;
        }

        /* 主容器 - 卡片风格，移动优先 */
        .app-container {
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 公用卡片 */
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            border: 1px solid #eef2f8;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0;
            color: #1e2f3f;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-sm {
            background: #eef2ff;
            color: #2c6e9e;
            font-size: 0.7rem;
            border-radius: 60px;
            padding: 4px 12px;
            font-weight: 500;
        }

        /* 交易列表区域 - 移动端滚动舒适 */
        .trade-list {
            overflow-x: auto;
            margin: 0 -6px;
            padding: 0 6px;
        }

        .trade-table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .trade-table th {
            text-align: left;
            padding: 12px 6px 10px 0;
            color: #5f7d9c;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .trade-table td {
            padding: 12px 6px 12px 0;
            border-bottom: 1px solid #ecf3fa;
            vertical-align: middle;
        }

        /* 交易类型徽章 */
        .type-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            min-width: 68px;
            text-align: center;
        }

        .type-buy {
            background: #e0f7ea;
            color: #0b6e41;
        }

        .type-sell {
            background: #ffe6e3;
            color: #bc1c2e;
        }

        /* 输入框样式，触摸友好 */
        .input-micro {
            width: 88px;
            padding: 8px 8px;
            border-radius: 20px;
            border: 1px solid #cfdfed;
            background: white;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            transition: 0.15s;
        }

        .input-micro:focus {
            outline: none;
            border-color: #2d7fb9;
            box-shadow: 0 0 0 2px rgba(45, 127, 185, 0.1);
        }

        .fee-detail-text {
            background: #f4f8fe;
            padding: 5px 8px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
            color: #2a5f8a;
        }

        .cash-number {
            font-family: monospace;
            font-weight: 600;
            background: #f8fafc;
            padding: 4px 8px;
            border-radius: 24px;
            display: inline-block;
            font-size: 0.8rem;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #9bb4cc;
            padding: 6px 6px;
            border-radius: 30px;
            transition: 0.1s;
        }

        .delete-btn:active {
            background: #f0eef2;
            color: #d14545;
        }

        /* 费率设置行 网格布局 */
        .fee-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
            margin-top: 6px;
        }

        .fee-item {
            flex: 1;
            min-width: 110px;
        }

        .fee-item label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #5a6f8c;
            display: block;
            margin-bottom: 8px;
        }

        .fee-item input {
            width: 100%;
            padding: 12px 10px;
            border-radius: 24px;
            border: 1px solid #dae6f0;
            background: white;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
        }

        /* 结果卡片 */
        .result-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-block {
            flex: 1;
            background: #f8fbfe;
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            min-width: 110px;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6c8db0;
            margin-bottom: 6px;
        }

        .result-number {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: monospace;
            color: #1e2f3f;
            word-break: break-word;
        }

        .highlight-number {
            color: #da7b2c;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            justify-content: center;
        }

        .btn {
            border: none;
            background: #eff3f9;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
            color: #2a5f8a;
            flex: 1 0 auto;
            text-align: center;
        }

        .btn-primary {
            background: #1f6f9e;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-primary:active {
            background: #0e5a82;
            transform: scale(0.97);
        }

        .btn-outline:active {
            background: #e2eaf3;
            transform: scale(0.97);
        }

        .footnote {
            font-size: 0.65rem;
            text-align: center;
            color: #8aa3c0;
            padding: 12px 8px 4px;
            border-top: 1px solid #eff3f8;
            margin-top: 10px;
        }

        /* 电脑优化 - 最大宽度舒适 */
        @media (min-width: 760px) {
            body {
                padding: 28px;
            }
            .app-container {
                max-width: 1100px;
            }
            .trade-table {
                min-width: auto;
            }
            .input-micro {
                width: 100px;
                padding: 10px;
            }
            .result-number {
                font-size: 1.4rem;
            }
        }

        /* 触摸反馈 */
        button, .btn, .delete-btn, input {
            touch-action: manipulation;
        }

        .empty-rows {
            text-align: center;
            color: #8da0b5;
            padding: 30px 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 交易流水卡片 -->
    <div class="card">
        <div class="card-header">
            <h2>📋 交易流水 <span class="badge-sm">每笔费用明细</span></h2>
            <div class="button-group" style="margin-top:0;">
                <button class="btn btn-outline" id="addBuyBtn">➕ 买入</button>
                <button class="btn btn-outline" id="addSellBtn">📤 卖出</button>
                <button class="btn btn-outline" id="resetBtn">🗑️ 清空</button>
            </div>
        </div>
        <div class="trade-list">
            <table class="trade-table" id="tradeTable">
                <thead>
                <tr><th>类型</th><th>价格(元)</th><th>股数</th><th>本次净现金流</th><th>费用明细</th><th>持仓成本</th><th></th></tr>
                </thead>
                <tbody id="tradeTbody">
                    <tr><td colspan="7" class="empty-rows">暂无交易，点击「买入」或「卖出」开始</td></tr>
                </tbody>
            </table>
        </div>
        <div class="footnote" style="border-top: none; margin-top: 8px; text-align: left;">
            💡 买入净额 = -(金额+佣金+过户费) &nbsp;&nbsp;|&nbsp;&nbsp; 卖出净额 = 金额-佣金-印花税-过户费
        </div>
    </div>

    <!-- 费率卡片 -->
    <div class="card">
        <div class="card-header">
            <h2>⚙️ 费率设置</h2>
        </div>
        <div class="fee-grid">
            <div class="fee-item">
                <label>📌 单笔佣金 (元/笔)</label>
                <input type="number" id="commissionFee" step="1" value="5" placeholder="固定佣金">
            </div>
            <div class="fee-item">
                <label>🧾 印花税率 (%)</label>
                <input type="number" id="stampTax" step="0.01" value="0.05" placeholder="卖出时征收">
                <div style="font-size:10px; color:#7895b2;">ETF为0%</div>
            </div>
            <div class="fee-item">
                <label>📄 过户费 (元/万股)</label>
                <input type="number" id="transferFee" step="0.1" value="0" placeholder="ETF为0">
            </div>
        </div>
    </div>

    <!-- 持仓概览卡片 -->
    <div class="card">
        <div class="card-header">
            <h2>📈 持仓概览</h2>
        </div>
        <div class="result-grid">
            <div class="result-block"><div class="result-label">📦 持股数量</div><div class="result-number" id="sharesCount">0</div></div>
            <div class="result-block"><div class="result-label">✨ 每股成本</div><div class="result-number highlight-number" id="avgCostVal">0.0000 元</div></div>
            <div class="result-block"><div class="result-label">💰 净投入资金</div><div class="result-number" id="netInvestVal">0.00 元</div></div>
        </div>
        <div class="result-grid">
            <div class="result-block"><div class="result-label">🏦 持仓市值</div><div class="result-number" id="marketValue">0.00 元</div></div>
            <div class="result-block"><div class="result-label">📊 浮动盈亏</div><div class="result-number" id="floatProfit">0.00 元</div></div>
            <div class="result-block"><div class="result-label">💰 总支出(含费)</div><div class="result-number" id="totalExp">0.00 元</div></div>
        </div>
        <button class="btn btn-primary" id="refreshCalcBtn" style="margin-top: 8px;">⟳ 刷新计算</button>
    </div>
    <div class="footnote">
        * 持仓市值基于最新交易价格估算，浮动盈亏随价格变化。<br>
        * 初始示例为空，所有记录为0，方便手机端直接录入。
    </div>
</div>

<script>
    // ---------- 交易数据结构，初始为空示例 ----------
    let transactions = [];   // 每个元素 { id, type, price, shares }

    // DOM 元素
    const tbody = document.getElementById('tradeTbody');
    const addBuyBtn = document.getElementById('addBuyBtn');
    const addSellBtn = document.getElementById('addSellBtn');
    const resetBtn = document.getElementById('resetBtn');
    const refreshBtn = document.getElementById('refreshCalcBtn');

    const commissionInput = document.getElementById('commissionFee');
    const stampInput = document.getElementById('stampTax');
    const transferInput = document.getElementById('transferFee');

    const sharesCountSpan = document.getElementById('sharesCount');
    const avgCostSpan = document.getElementById('avgCostVal');
    const netInvestSpan = document.getElementById('netInvestVal');
    const marketValueSpan = document.getElementById('marketValue');
    const floatProfitSpan = document.getElementById('floatProfit');
    const totalExpSpan = document.getElementById('totalExp');

    // ---------- 费用核心函数 ----------
    function calcBuyFlow(price, shares, comm, transPer10k) {
        const amount = price * shares;
        let transfer = transPer10k > 0 ? (amount / 10000) * transPer10k : 0;
        const totalOut = amount + comm + transfer;
        return { amount, commission: comm, transfer, totalOut };
    }

    function calcSellFlow(price, shares, comm, stampRate, transPer10k) {
        const amount = price * shares;
        let stamp = stampRate > 0 ? amount * (stampRate / 100) : 0;
        let transfer = transPer10k > 0 ? (amount / 10000) * transPer10k : 0;
        const totalIn = amount - comm - stamp - transfer;
        return { amount, commission: comm, stamp, transfer, totalIn };
    }

    // 获取完整统计数据（支出/收入/净股数/平均成本/最新市值）
    function computeStats() {
        let comm = parseFloat(commissionInput.value) || 0;
        let stampRate = parseFloat(stampInput.value) || 0;
        let transPer10k = parseFloat(transferInput.value) || 0;

        let totalExp = 0, totalIncome = 0, netShares = 0;
        for (let tx of transactions) {
            let price = parseFloat(tx.price);
            let shares = parseInt(tx.shares);
            if (isNaN(price) || isNaN(shares) || shares <= 0 || price <= 0) continue;
            if (tx.type === 'buy') {
                let buy = calcBuyFlow(price, shares, comm, transPer10k);
                totalExp += buy.totalOut;
                netShares += shares;
            } else {
                let sell = calcSellFlow(price, shares, comm, stampRate, transPer10k);
                totalIncome += sell.totalIn;
                netShares -= shares;
            }
        }
        const netInvest = totalExp - totalIncome;
        let avgCost = 0;
        if (netShares > 0) avgCost = netInvest / netShares;
        else if (netShares === 0) avgCost = 0;
        else avgCost = -1;

        // 最新市价 (取最后一笔交易价格)
        let lastPrice = 1.0;
        if (transactions.length > 0) {
            for (let i = transactions.length-1; i >= 0; i--) {
                let p = parseFloat(transactions[i].price);
                if (!isNaN(p) && p > 0) { lastPrice = p; break; }
            }
        } else {
            lastPrice = 1.0;
        }
        const currentMktValue = netShares > 0 ? netShares * lastPrice : 0;
        const floatProfit = netShares > 0 && avgCost > 0 ? (lastPrice - avgCost) * netShares : 0;
        return { netShares, totalExp, totalIncome, netInvest, avgCost, currentMktValue, floatProfit, lastPrice };
    }

    // 渲染表格 + 更新所有数值（手机触摸优化）
    function renderAndUpdate() {
        // 渲染交易表格
        if (transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-rows">✨ 暂无交易，点击「买入」或「卖出」开始</td></tr>';
        } else {
            let html = '';
            for (let i = 0; i < transactions.length; i++) {
                const tx = transactions[i];
                const priceVal = parseFloat(tx.price);
                const sharesVal = parseInt(tx.shares);
                if (isNaN(priceVal) || isNaN(sharesVal) || sharesVal <= 0 || priceVal <= 0) continue;
                
                // 获取费率用于本次展示
                const commNow = parseFloat(commissionInput.value) || 0;
                const stampNow = parseFloat(stampInput.value) || 0;
                const transNow = parseFloat(transferInput.value) || 0;
                let cashFlow = 0;
                let feeDesc = '';
                if (tx.type === 'buy') {
                    const buyRes = calcBuyFlow(priceVal, sharesVal, commNow, transNow);
                    cashFlow = -buyRes.totalOut;
                    feeDesc = `佣 ${buyRes.commission.toFixed(2)} | 过 ${buyRes.transfer.toFixed(2)}`;
                } else {
                    const sellRes = calcSellFlow(priceVal, sharesVal, commNow, stampNow, transNow);
                    cashFlow = sellRes.totalIn;
                    feeDesc = `佣 ${sellRes.commission.toFixed(2)} | 印 ${sellRes.stamp.toFixed(2)} | 过 ${sellRes.transfer.toFixed(2)}`;
                }
                
                // 计算截止到该笔的“持仓成本金额” (累计净投入)
                let simExp = 0, simInc = 0, simShares = 0;
                for (let j = 0; j <= i; j++) {
                    const ttx = transactions[j];
                    const p = parseFloat(ttx.price);
                    const s = parseInt(ttx.shares);
                    if (isNaN(p) || isNaN(s) || s <= 0) continue;
                    const commT = parseFloat(commissionInput.value)||0;
                    const stampT = parseFloat(stampInput.value)||0;
                    const transT = parseFloat(transferInput.value)||0;
                    if (ttx.type === 'buy') {
                        const buyT = calcBuyFlow(p, s, commT, transT);
                        simExp += buyT.totalOut;
                        simShares += s;
                    } else {
                        const sellT = calcSellFlow(p, s, commT, stampT, transT);
                        simInc += sellT.totalIn;
                        simShares -= s;
                    }
                }
                const netInvestNow = simExp - simInc;
                const holdingAmount = (simShares > 0) ? netInvestNow : 0;
                
                const typeLabel = tx.type === 'buy' ? '买入' : '卖出';
                const typeClass = tx.type === 'buy' ? 'type-buy' : 'type-sell';
                html += `<tr>
                    <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
                    <td><input type="number" step="0.001" class="input-micro edit-price" value="${priceVal}" data-idx="${i}" style="width:85px;"></td>
                    <td><input type="number" step="1" class="input-micro edit-shares" value="${sharesVal}" data-idx="${i}" style="width:80px;"></td>
                    <td><span class="cash-number">${cashFlow.toFixed(2)}</span></td>
                    <td><span class="fee-detail-text">${feeDesc}</span></td>
                    <td><span class="cash-number">${holdingAmount.toFixed(2)} 元</span></td>
                    <td><button class="delete-btn" data-remove="${i}">✕</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;
            
            // 绑定编辑事件
            document.querySelectorAll('.edit-price').forEach(inp => {
                inp.onchange = (e) => {
                    let idx = parseInt(e.target.dataset.idx);
                    let newPrice = parseFloat(e.target.value);
                    if (!isNaN(newPrice) && transactions[idx]) transactions[idx].price = newPrice;
                    renderAndUpdate();
                };
            });
            document.querySelectorAll('.edit-shares').forEach(inp => {
                inp.onchange = (e) => {
                    let idx = parseInt(e.target.dataset.idx);
                    let newShares = parseInt(e.target.value);
                    if (!isNaN(newShares) && newShares > 0 && transactions[idx]) transactions[idx].shares = newShares;
                    renderAndUpdate();
                };
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = (e) => {
                    let idx = parseInt(btn.dataset.remove);
                    if (!isNaN(idx) && transactions[idx]) {
                        transactions.splice(idx, 1);
                        renderAndUpdate();
                    }
                };
            });
        }
        
        // 更新统计数字
        const stats = computeStats();
        sharesCountSpan.innerText = stats.netShares >= 0 ? `${stats.netShares} 股` : (stats.netShares<0 ? '空仓' : '0');
        avgCostSpan.innerText = (stats.avgCost > 0 ? stats.avgCost.toFixed(4) : (stats.netShares===0 ? '0.0000' : '----')) + ' 元';
        netInvestSpan.innerText = stats.netInvest.toFixed(2) + ' 元';
        marketValueSpan.innerText = stats.currentMktValue.toFixed(2) + ' 元';
        floatProfitSpan.innerText = (stats.floatProfit >= 0 ? `+${stats.floatProfit.toFixed(2)}` : `${stats.floatProfit.toFixed(2)}`) + ' 元';
        totalExpSpan.innerText = stats.totalExp.toFixed(2) + ' 元';
    }
    
    // 添加交易
    function addTransaction(type) {
        let defaultPrice = 1.50;
        if (transactions.length > 0) {
            const lastTx = transactions[transactions.length-1];
            if (lastTx && typeof lastTx.price === 'number') {
                defaultPrice = type === 'buy' ? lastTx.price * 0.98 : lastTx.price * 1.02;
                defaultPrice = Math.round(defaultPrice * 1000) / 1000;
                if (defaultPrice <= 0) defaultPrice = 1.50;
            }
        } else {
            defaultPrice = type === 'buy' ? 1.50 : 1.52;
        }
        transactions.push({
            id: Date.now() + Math.random(),
            type: type,
            price: defaultPrice,
            shares: 200
        });
        renderAndUpdate();
    }
    
    // 清空全部交易
    function resetAllTransactions() {
        transactions = [];
        renderAndUpdate();
    }
    
    // 强制刷新（费率改变时使用）
    function forceRefresh() {
        renderAndUpdate();
    }
    
    // 绑定费率事件
    function bindFeeEvents() {
        [commissionInput, stampInput, transferInput].forEach(inp => {
            inp.addEventListener('input', () => forceRefresh());
        });
    }
    
    // 按钮事件
    addBuyBtn.addEventListener('click', () => addTransaction('buy'));
    addSellBtn.addEventListener('click', () => addTransaction('sell'));
    resetBtn.addEventListener('click', resetAllTransactions);
    refreshBtn.addEventListener('click', forceRefresh);
    
    // 初始化，示例为空
    bindFeeEvents();
    renderAndUpdate();
</script>
</body>
</html>
